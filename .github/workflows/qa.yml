name: QA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Nix QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout v6 pinned to immutable commit.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Prepare pull request branch context
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/main:refs/remotes/origin/main'
          git checkout -B "${GITHUB_HEAD_REF:-pull-request}" HEAD
          git branch --set-upstream-to=origin/main "${GITHUB_HEAD_REF:-pull-request}"

      - name: Install Nix
        # cachix/install-nix-action v31 pinned to immutable commit.
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check whitespace
        run: git diff --check

      - name: Run local QA gate
        run: nix-shell --run './bin/dev-qa'

      - name: Prepare Atlas v1 readiness layout
        run: mkdir -p logs releases reports sessions state/atlas state/intel targets

      - name: Check Atlas v1 readiness
        run: nix-shell --run './tools/atlas/bin/atlas v1 status --strict'
