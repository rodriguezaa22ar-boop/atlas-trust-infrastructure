name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '37 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze GitHub Actions workflows
    if: github.repository == 'rodriguezaa22ar-boop/atlas-trust-infrastructure'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout v6 pinned to immutable commit.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        # github/codeql-action v4 pinned to immutable commit.
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          languages: actions
          build-mode: none
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        # github/codeql-action v4 pinned to immutable commit.
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          category: "/language:actions"
