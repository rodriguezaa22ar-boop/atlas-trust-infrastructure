name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '37 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze GitHub Actions workflows
    if: github.repository == 'rodriguezaa22ar-boop/atlas-trust-infrastructure'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # actions/checkout v6 pinned to immutable commit.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        # github/codeql-action v4 pinned to immutable commit.
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          languages: actions
          build-mode: none
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        # github/codeql-action v4 pinned to immutable commit.
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          category: "/language:actions"
