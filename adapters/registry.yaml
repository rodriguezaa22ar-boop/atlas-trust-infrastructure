{
  "schema_version": "atlas.adapter_registry.v1",
  "default_mode": "deny",
  "status": "draft",
  "live_integrations_enabled": false,
  "metadata_only": true,
  "adapters": [
    {
      "id": "generic.external_event.import",
      "title": "Generic External Event Metadata Import",
      "status": "draft",
      "mode": "import",
      "systems": [
        "generic_external_event"
      ],
      "resources": [
        "local_event_file",
        "receipt_output"
      ],
      "effects": [
        "normalize_metadata",
        "write_metadata_receipt"
      ],
      "capabilities": [
        "atlas.adapter.import"
      ],
      "approval": "none",
      "evidence": {
        "emits": [
          "decision",
          "source_ref",
          "artifact_hash",
          "generated_receipt_ref",
          "known_limitations"
        ]
      },
      "metadata_only": true,
      "live_integration": false,
      "secrets_policy": "metadata_only_no_secrets_or_raw_payloads",
      "forbidden_inputs": [
        "raw_logs",
        "secrets",
        "private_keys",
        "tokens",
        "authorization_headers",
        "request_bodies",
        "response_bodies",
        "packet_captures"
      ],
      "test_fixtures": [
        "examples/adapters/generic-external-event/minimal-event.json"
      ],
      "known_limitations": [
        "Local file import only.",
        "No live integration or webhook listener is added.",
        "Receipt evidence remains metadata-only."
      ]
    },
