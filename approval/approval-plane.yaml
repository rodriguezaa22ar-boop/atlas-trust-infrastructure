        "data class changed",
        "control objective changed",
        "approval expired"
      ],
      "decision_outputs": [
        "approved",
        "rejected",
        "expired",
        "stale",
        "unsupported",
        "boundary_violation"
      ],
      "evidence_required": [
        "business-flow id",
        "business owner label",
        "data class label",
        "control objective label",
        "decision status",
        "evidence_refs",
        "known_limitations"
      ],
      "metadata_only": true,
      "live_execution": false,
      "automatic_execution": false,
      "break_glass": {
        "allowed": false,
