      ],
      "evidence_required": [
        "production-readiness objective reference",
        "exception rationale reference",
        "reviewer identity references",
        "decision status",
        "evidence_refs",
        "known_limitations"
      ],
      "metadata_only": true,
      "live_execution": false,
      "automatic_execution": false,
      "break_glass": {
        "allowed": false,
        "execution_enabled": false,
        "boundary": "not applicable"
      },
      "known_limitations": [
